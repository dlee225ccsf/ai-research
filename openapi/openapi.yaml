openapi: 3.0.3
info:
  title: Job Application Tracker API
  version: 1.0.0
  description: |
    Starter OpenAPI spec for Spec-Driven Development and TDD.
servers:
  - url: http://localhost:3000
    description: Local development server
  - url: http://localhost:4010
    description: Prism mock server

tags:
  - name: Health
  - name: Applications

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check endpoint
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                timestamp: '2026-04-26T00:00:00.000Z'

  /api/v1/applications:
    get:
      tags: [Applications]
      summary: List applications for the authenticated user
      operationId: listApplications
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: take
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/ApplicationStatus'
      responses:
        '200':
          description: A paginated list of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Application'
        '401':
          description: Missing or invalid auth token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                code: AUTH_REQUIRED

    post:
      tags: [Applications]
      summary: Create a new application
      operationId: createApplication
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationRequest'
      responses:
        '201':
          description: Application created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Invalid request payload
                code: VALIDATION_ERROR
        '401':
          description: Missing or invalid auth token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/applications/{id}:
    get:
      tags: [Applications]
      summary: Get one application by id
      operationId: getApplicationById
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Application found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '401':
          description: Missing or invalid auth token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Application not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Application not found
                code: NOT_FOUND

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApplicationStatus:
      type: string
      enum: [APPLIED, INTERVIEWING, REJECTED, OFFERED]

    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          enum: [ok]
        timestamp:
          type: string
          format: date-time

    CreateApplicationRequest:
      type: object
      required: [companyName, jobTitle, appliedDate]
      properties:
        companyName:
          type: string
          minLength: 1
        jobTitle:
          type: string
          minLength: 1
        jobUrl:
          type: string
          format: uri
        appliedDate:
          type: string
          format: date-time
        notes:
          type: string

    Application:
      type: object
      required: [id, companyName, jobTitle, status, appliedDate, createdAt, updatedAt]
      properties:
        id:
          type: string
        companyName:
          type: string
        jobTitle:
          type: string
        jobUrl:
          type: string
          format: uri
        status:
          $ref: '#/components/schemas/ApplicationStatus'
        appliedDate:
          type: string
          format: date-time
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
